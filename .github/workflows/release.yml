name: Release

# Builds the Windows installer + Linux tarball + macOS .dmg and publishes them as
# assets on a GitHub Release. See CLAUDE.md → "Release automation (GitHub Actions)".
# This mirrors ArcaneAtlas's workflow; ArcaneEye has NO ffmpeg (in-process Qt
# capture), so the ffmpeg steps are omitted.
#
# Trigger EITHER by:
#   1. pushing a version tag:   git tag v0.8.0 && git push origin v0.8.0
#   2. Actions tab → Release → Run workflow (enter version, e.g. 0.8.0)
#
# Re-running for the same version is safe: the release job overwrites same-named
# assets on the existing release (idempotent).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (no leading v), e.g. 0.8.0'
        required: true

# App-specific values — the ONLY block that changes between the 3 apps.
env:
  APP_NAME:     ArcaneEye
  WIN_ASSET:    ArcaneEye-Setup-windows.exe
  LINUX_ASSET:  ArcaneEye-linux.tar.gz
  MAC_ASSET:    ArcaneEye-macos.dmg

jobs:
  # ───────────────────────────── Windows installer ─────────────────────────────
  build-windows:
    runs-on: windows-latest
    # Microsoft Trusted Signing secrets. Absent → the signing steps skip and an
    # UNSIGNED installer is produced. Present → app exe + installer are signed.
    env:
      AZURE_TENANT_ID:          ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:          ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET:      ${{ secrets.AZURE_CLIENT_SECRET }}
      TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
      TRUSTED_SIGNING_ACCOUNT:  ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
      TRUSTED_SIGNING_PROFILE:  ${{ secrets.TRUSTED_SIGNING_PROFILE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      # NOTE: CI decomposes what build_installer.bat does locally (PyInstaller →
      # Inno) so signing can slot BETWEEN them — the app exe must be signed before
      # Inno bundles it. Keep in sync with build_installer.bat (same spec, .iss,
      # version-from-__init__.py).
      - name: Build app with PyInstaller
        shell: cmd
        run: pyinstaller --noconfirm arcaneeye.spec

      - name: Azure CLI login for signing (skipped if unsigned)
        if: env.AZURE_CLIENT_ID != ''
        shell: pwsh
        run: |
          az login --service-principal `
            --username $env:AZURE_CLIENT_ID `
            --password $env:AZURE_CLIENT_SECRET `
            --tenant $env:AZURE_TENANT_ID `
            --allow-no-subscriptions

      - name: Sign the app exe (skipped if unsigned)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\dist\ArcaneEye
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          if not exist installer mkdir installer
          if not exist installer\assets mkdir installer\assets
          copy /Y arcaneeye\resources\AGPL_V3.txt installer\assets\AGPL_V3.txt
          copy /Y arcaneeye\resources\icon.ico    installer\assets\installer.ico
          copy /Y arcaneeye.iss installer\arcaneeye.iss
          set "VERSION="
          for /f "tokens=2 delims== " %%v in ('findstr /b /c:"__version__" "arcaneeye\__init__.py"') do set "VERSION=%%~v"
          if not defined VERSION ( echo Could not read __version__ & exit /b 1 )
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=%VERSION% arcaneeye.iss

      - name: Sign the installer (skipped if unsigned)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\installer\output
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Collect installer under the contract name
        shell: pwsh
        run: |
          $exe = Get-ChildItem installer/output/*.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "No installer produced in installer/output"; exit 1 }
          Copy-Item $exe.FullName "$env:WIN_ASSET"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ env.WIN_ASSET }}
          if-no-files-found: error

  # ───────────────────────────── Linux tarball ─────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Install Qt/xcb + X system libs (PySide6 + pynput need these)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libglib2.0-0 xvfb \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0

      # xvfb-run gives a display so importing pynput's Xorg backend during the
      # PyInstaller analysis can't stumble on a missing $DISPLAY.
      - name: Build with PyInstaller
        env:
          QT_QPA_PLATFORM: offscreen
        run: xvfb-run -a pyinstaller --noconfirm arcaneeye.spec

      - name: Package tarball under the contract name
        run: |
          test -x "dist/${APP_NAME}/${APP_NAME}" || { echo "Build output missing"; exit 1; }
          tar -czf "$LINUX_ASSET" -C dist "$APP_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: ${{ env.LINUX_ASSET }}
          if-no-files-found: error

  # ───────────────────────────── macOS .dmg ────────────────────────────────────
  # UNIVERSAL2 (arm64 + x86_64) build on the macos-14 Apple Silicon runner — runs
  # on both Apple Silicon and Intel Macs, built entirely on the arm64 runner (the
  # deprecated Intel macos-13 runner is never used). UNSIGNED unless the MACOS_*
  # secrets are present, in which case PyInstaller signs during the build and the
  # dmg is notarized + stapled.
  build-macos:
    runs-on: macos-14
    env:
      MACOS_CERT_P12:         ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD:    ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY:    ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_TEAM_ID:          ${{ secrets.MACOS_TEAM_ID }}
      MACOS_NOTARY_KEY_ID:    ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
      MACOS_NOTARY_KEY_P8:    ${{ secrets.MACOS_NOTARY_KEY_P8 }}
    steps:
      - uses: actions/checkout@v4

      # Universal2 needs a universal2 Python (python.org, not setup-python which is
      # arch-specific) + universal2 wheels (PySide6 ships them). Built on the arm64
      # runner; the x86_64 slice is cross-produced via target_arch='universal2'.
      - name: Install universal2 Python
        run: |
          PY=3.12.8
          curl -fL "https://www.python.org/ftp/python/${PY}/python-${PY}-macos11.pkg" -o python.pkg
          sudo installer -pkg python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> "$GITHUB_PATH"
          lipo -archs "/Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12"

      - name: Install Python deps
        run: python3.12 -m pip install --upgrade pip -r requirements.txt

      - name: Import signing certificate (skipped if unsigned)
        if: env.MACOS_CERT_P12 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build with PyInstaller (universal2; signs during build when identity is set)
        run: python3.12 -m PyInstaller --noconfirm arcaneeye.spec

      - name: Package .dmg under the contract name
        run: |
          test -d "dist/${APP_NAME}.app" || { echo "No .app bundle produced"; exit 1; }
          mkdir -p dmg_stage
          cp -R "dist/${APP_NAME}.app" dmg_stage/
          ln -s /Applications dmg_stage/Applications
          hdiutil create -volname "${APP_NAME}" -srcfolder dmg_stage \
            -ov -format UDZO "${MAC_ASSET}"

      - name: Sign, notarize & staple the .dmg (skipped if unsigned)
        if: env.MACOS_CERT_P12 != ''
        run: |
          codesign --force --timestamp --sign "$MACOS_SIGN_IDENTITY" "$MAC_ASSET"
          echo "$MACOS_NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          if ! grep -q "BEGIN PRIVATE KEY" "$RUNNER_TEMP/notary.p8"; then
            echo "::error::MACOS_NOTARY_KEY_P8 did not decode to a PEM private key (run: base64 -w0 AuthKey_XXXX.p8)."
            exit 1
          fi
          xcrun notarytool submit "$MAC_ASSET" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait --timeout 2h
          rm -f "$RUNNER_TEMP/notary.p8"
          xcrun stapler staple "$MAC_ASSET"

      - name: Verify Gatekeeper would accept the app (skipped if unsigned)
        if: env.MACOS_CERT_P12 != ''
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/${APP_NAME}.app"
          spctl --assess --type exec --verbose=4 "dist/${APP_NAME}.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.MAC_ASSET }}
          if-no-files-found: error

  # ───────────────────────────── Publish the release ───────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ env.APP_NAME }} ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
